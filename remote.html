<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/remote-manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ekklesienter Remote Control</title>
  </head>
  <body class="bg-gray-950 text-white min-h-screen overscroll-none overflow-hidden select-none">
    <div id="remote-root" class="min-h-screen"></div>
    <script type="module" src="./src/remote/main.tsx"></script>
    <script>
        // Request wake lock to prevent the phone screen from dimming/sleeping
        let wakeLock = null;
        const requestWakeLock = async () => {
          try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Wake lock is active');
            }
          } catch (err) {
            console.error('Wake lock error: ', err);
          }
        };

        // Re-request wake lock when visibility changes
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible' && wakeLock !== null) {
            requestWakeLock();
          }
        });
        
        requestWakeLock();
    </script>
  </body>
</html>
